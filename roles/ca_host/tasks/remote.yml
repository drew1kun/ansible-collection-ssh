---
- name: "[remote.yml] Set SSH host CA derived facts"
  ansible.builtin.set_fact:
    ssh_ca_host_key_mismatch: false
    ssh_ca_host_key_fingerprint: null
    ssh_ca_host_key_path: >-
      {{ ssh_common_etc_dir }}/ssh_host_{{ ssh_ca_host_key.get('type','ed25519')
        | default('ed25519') }}_key
    ssh_ca_host_pub_path: >-
      {{ ssh_common_etc_dir }}/ssh_host_{{ ssh_ca_host_key.get('type','ed25519')
        | default('ed25519') }}_key.pub
    ssh_ca_host_crt_path: >-
      {{ ssh_common_etc_dir }}/ssh_host_{{ ssh_ca_host_key.get('type','ed25519')
        | default('ed25519') }}_key-cert.pub

- name: "[remote.yml] REMOTE: Generate HostCA if it does not exist"
  ansible.builtin.import_role:
    name: ssh_keygen
  vars:
    ssh_keygen_notify: ['Reload sshd']
    # must be a list of keys (ssh_ca_host is a map), so:
    ssh_keygen_keys:
      - >-
        {{
          ssh_ca_host_key
          | combine({
            'path': ssh_ca_host_key_path,
            'regenerate': 'always' if ssh_ca_host_reissue_keys else 'full_idempotence',
            'owner': ssh_common_owner,
            'group': ssh_common_group
          })
        }}
  become: "{{ ansible_user_id != 'root' }}"

- name: "[remote.yml] Check if the Cert file already exists"
  ansible.builtin.stat:
    path: "{{ ssh_ca_host_crt_path }}"
  register: ssh_ca_host_old_cert

- name: "[remote.yml: check_block] Run checks on existing Host Certificate"
  when: ssh_ca_host_old_cert.stat.exists
  become: true
  block:
    - name: "[remote.yml: check_block] Fix SSH host certificate ownership if wrong"
      ansible.builtin.file:
        path: "{{ ssh_ca_host_crt_path }}"
        <<: &ssh_ca_host_file_ownership
          owner: "{{ ssh_common_owner }}"
          group: "{{ ssh_common_group }}"
      when: >-
        ssh_ca_host_old_cert.stat.pw_name != ssh_common_owner
        or
        ssh_ca_host_old_cert.stat.gr_name != ssh_common_group

    - name: "[remote.yml: check_block] Get Host private key fingerprint"
      ansible.builtin.command:
        cmd: "ssh-keygen -l -f {{ ssh_ca_host_key_path }}"
      register: ssh_ca_host_key_fingerprint
      changed_when: false

    - name: "[remote.yml: check_block] Get fingerprint of the SSH host certificate"
      ansible.builtin.command:
        cmd: "ssh-keygen -l -f {{ ssh_ca_host_crt_path }}"
      register: ssh_ca_host_cert_fingerprint
      changed_when: false

    - name: "[remote.yml: check_block] Check if existing Certificate matches the Key"
      ansible.builtin.set_fact:
        ssh_ca_host_key_mismatch: >-
          {{
            (ssh_ca_host_key_fingerprint.stdout
              | regex_search('SHA256:[A-Za-z0-9+/=]+'))
            !=
            (ssh_ca_host_cert_fingerprint.stdout
              | regex_search('SHA256:[A-Za-z0-9+/=]+'))
          }}

    - name: "[main.yml] Include getcert tasks"
      ansible.builtin.include_tasks:
        file: getcert.yml
        apply:
          tags:
            - ssh_hostCA
            - ssh_hostCA_remote

    - name: "[main.yml] Remember existing cert number"
      ansible.builtin.set_fact:
        ssh_ca_host_old_cert_sn: "{{ ssh_ca_host_cert_serial }}"


- name: "[remote.yml: cert_block] Ensure Host Certificate is correct"
  become: true
  when: >-
    ssh_keygen_issued.changed
    or ssh_ca_host_reissue_certs
    or not ssh_ca_host_old_cert.stat.exists
    or ssh_ca_host_key_mismatch
  block:
    - name: "[remote.yml] Temporarily copy HostCA to Managed Host"
      ansible.builtin.copy:
        src: "{{ ssh_ca_host__ca.path }}"
        dest: "{{ ssh_common_etc_dir }}"
        mode: '0600'
        backup: false
        <<: *ssh_ca_host_file_ownership
      changed_when: false

    - name: "[remote.yml] List the Host certificate principals"
      ansible.builtin.debug:
        msg: |
          ssh_ca_host_cert.principals: {{ ssh_ca_host_cert.principals | default([]) }}

    # The CA Key has to be WITHOUT a passphrase
    - name: "[remote.yml] Issue Host Certificate"
      community.crypto.openssh_cert:
        type: host
        valid_from: "{{ ssh_ca_host_cert.get('valid_from', 'always') | string }}"
        valid_to: "{{ ssh_ca_host_cert.get('valid_to', 'forever') | string }}"
        signing_key: "{{ ssh_common_etc_dir | string }}/{{ ssh_ca_host__ca.path.split('/')[-1] }}"
        public_key: "{{ ssh_ca_host_pub_path }}"
        path: "{{ ssh_ca_host_crt_path }}"
        serial_number: >-
          {{
            1 if ssh_keygen_issued.changed | default(false)
            else (ssh_ca_host_old_cert_sn | default(0) | int) + 1
          }}
        principals: "{{ ssh_ca_host_cert.get('principals', omit) | list }}"
        # cert won't be reissued even if id is new:
        identifier: "{{ ssh_ca_host_cert.get('id', inventory_hostname) | string }}"
        regenerate: >-
          {{
            'always' if ssh_ca_host_reissue_keys or ssh_ca_host_reissue_certs
            else 'full_idempotence'
          }}
        <<: *ssh_ca_host_file_ownership
      register: ssh_ca_host_cert_issued
      notify:
        - Reload sshd
        - Output cert info

    - name: "[remote.yml] Remove HostCA from Managed Host after using it"
      ansible.builtin.file:
        path: "{{ ssh_common_etc_dir | string }}/{{ ssh_ca_host__ca.path.split('/')[-1] }}"
        state: absent
      changed_when: false

## My recipe here:
# lineinfile:
#   regexp: '^([\s]*[#]*)*LINE_PART_1[\s]*LINE_PART_2[\s]*(.*)$
#   line: "LINE_PART_1  LINE_PART_2"
#   insertafter: "^([\s]*[#]*)*AFTER_PATTERN[\s]*(.*)$"
- name: "[remote.yml] Make sure sshd uses the new Host Key and Certificate"
  ansible.builtin.lineinfile:
    path: "{{ ssh_common_daemon_cfg }}"
    regexp: "{{ ssh_ca_host_id.regexp }}"
    line: "{{ ssh_ca_host_id.line }}"
    insertafter: '^([\s]*[#]*)*HostKey[\s]*(.*)$'
    firstmatch: false
  loop:
    - line: "HostKey {{ ssh_ca_host_key_path }}"
      regexp: >-
        ^([\s]*[#]*)*HostKey(\s)*{{ ssh_ca_host_key_path | regex_escape }}[\s]*(.*)$
    - line: "HostCertificate {{ ssh_ca_host_crt_path }}"
      regexp: >-
        ^([\s]*[#]*)*HostCertificate(\s)*{{ ssh_ca_host_crt_path | regex_escape }}[\s]*(.*)$
  loop_control:
    loop_var: ssh_ca_host_id
    label: "{{ ssh_ca_host_id.line }} - configured"
  become: true
  notify: Reload sshd
